repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
        exclude: tsconfig\.json$
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pathspec, pyyaml, json5, jsonschema]
        files: ^sdlc_assessor/

  - repo: local
    hooks:
      - id: schema-sync
        name: evidence_schema.json sync (docs/ vs package)
        entry: python scripts/check_schema_sync.py
        language: system
        files: ^(docs/evidence_schema\.json|sdlc_assessor/core/evidence_schema\.json)$
        pass_filenames: false
